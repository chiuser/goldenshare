name: Dataset Ingestion Guardrail

on:
  pull_request:
    paths:
      - "src/foundation/datasets/**"
      - "src/foundation/ingestion/**"
      - "src/ops/runtime/**"
      - "src/ops/api/task_runs.py"
      - "src/ops/api/codebook.py"
      - "src/ops/action_catalog.py"
      - "src/ops/models/ops/task_run*.py"
      - "src/ops/schemas/task_run.py"
      - "src/ops/schemas/ingestion_codebook.py"
      - "src/ops/queries/**"
      - "src/ops/services/**"
      - "tests/architecture/test_dataset_codebook_guardrails.py"
      - "tests/architecture/test_dataset_runtime_registry_guardrails.py"
      - "tests/architecture/test_dataset_maintenance_refactor_guardrails.py"
      - "tests/architecture/test_arch_no_all_sentinel.py"
      - "tests/web/test_ops_codebook_api.py"
      - "tests/web/test_ops_task_run_api.py"
      - "pyproject.toml"
      - ".github/workflows/ingestion-guardrail.yml"
  push:
    branches:
      - dev-interface
      - main
    paths:
      - "src/foundation/datasets/**"
      - "src/foundation/ingestion/**"
      - "src/ops/runtime/**"
      - "src/ops/api/task_runs.py"
      - "src/ops/api/codebook.py"
      - "src/ops/action_catalog.py"
      - "src/ops/models/ops/task_run*.py"
      - "src/ops/schemas/task_run.py"
      - "src/ops/schemas/ingestion_codebook.py"
      - "src/ops/queries/**"
      - "src/ops/services/**"
      - "tests/architecture/test_dataset_codebook_guardrails.py"
      - "tests/architecture/test_dataset_runtime_registry_guardrails.py"
      - "tests/architecture/test_dataset_maintenance_refactor_guardrails.py"
      - "tests/architecture/test_arch_no_all_sentinel.py"
      - "tests/web/test_ops_codebook_api.py"
      - "tests/web/test_ops_task_run_api.py"
      - "pyproject.toml"
      - ".github/workflows/ingestion-guardrail.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dataset-ingestion-guardrail:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Dataset ingestion architecture guardrails
        run: pytest -q tests/architecture/test_dataset_codebook_guardrails.py tests/architecture/test_dataset_runtime_registry_guardrails.py tests/architecture/test_dataset_maintenance_refactor_guardrails.py tests/architecture/test_arch_no_all_sentinel.py

      - name: Ops ingestion API contracts
        run: pytest -q tests/web/test_ops_codebook_api.py

      - name: TaskRun ingestion API contract
        run: pytest -q tests/web/test_ops_task_run_api.py

      - name: DatasetDefinition ingestion lint
        run: goldenshare ingestion-lint-definitions

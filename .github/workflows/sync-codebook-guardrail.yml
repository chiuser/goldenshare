name: Sync Codebook Guardrail

on:
  pull_request:
    paths:
      - "src/foundation/services/sync_v2/**"
      - "src/ops/runtime/**"
      - "src/ops/api/codebook.py"
      - "src/ops/schemas/sync_codebook.py"
      - "tests/architecture/test_sync_v2_codebook_guardrails.py"
      - "tests/web/test_ops_codebook_api.py"
      - "pyproject.toml"
      - ".github/workflows/sync-codebook-guardrail.yml"
  push:
    branches:
      - dev-interface
      - main
    paths:
      - "src/foundation/services/sync_v2/**"
      - "src/ops/runtime/**"
      - "src/ops/api/codebook.py"
      - "src/ops/schemas/sync_codebook.py"
      - "tests/architecture/test_sync_v2_codebook_guardrails.py"
      - "tests/web/test_ops_codebook_api.py"
      - "pyproject.toml"
      - ".github/workflows/sync-codebook-guardrail.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-codebook-guardrail:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Sync codebook architecture guardrail
        run: pytest -q tests/architecture/test_sync_v2_codebook_guardrails.py

      - name: Sync codebook API contract
        run: pytest -q tests/web/test_ops_codebook_api.py

      - name: Sync V2 contract lint
        run: goldenshare sync-v2-lint-contracts

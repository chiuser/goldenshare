name: Frontend Quality Gate

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-quality-gate.yml"
  push:
    branches:
      - dev-interface
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-quality-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-quality:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend rule check
        run: npm run check:rules

      - name: Unit test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Smoke and visual gate
        run: PLAYWRIGHT_BROWSERS_PATH=0 npm run test:smoke:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

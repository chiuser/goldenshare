<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goldenshare 运维系统</title>
  <link rel="stylesheet" href="/static/ops-console.css">
</head>
<body>
  <div class="ops-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <span class="eyebrow">Operations</span>
        <h1 class="brand-title">运维系统</h1>
        <p class="brand-copy">围绕调度、执行、监控和新鲜度的统一控制面。当前为管理员控制台阶段。</p>
      </div>

      <nav class="nav-group" id="ops-nav">
        <a class="nav-link" data-route="overview" href="/ops">
          <span>总览</span>
          <small>/ops</small>
        </a>
        <a class="nav-link" data-route="freshness" href="/ops/freshness">
          <span>数据新鲜度</span>
          <small>/ops/freshness</small>
        </a>
        <a class="nav-link" data-route="schedules" href="/ops/schedules">
          <span>调度配置</span>
          <small>/ops/schedules</small>
        </a>
        <a class="nav-link" data-route="executions" href="/ops/executions">
          <span>执行中心</span>
          <small>/ops/executions</small>
        </a>
        <a class="nav-link" data-route="catalog" href="/ops/catalog">
          <span>资源目录</span>
          <small>/ops/catalog</small>
        </a>
      </nav>

      <div class="sidebar-card">
        <h3>平台基线</h3>
        <p>本页只参考旧系统的页面组织与交互习惯，前后端架构完全遵循当前 `goldenshare` 的控制面模型。</p>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1 class="page-title" id="page-title">运维系统总览</h1>
          <p class="page-copy" id="page-copy">这里会逐步长成统一的运维控制台，而不是一次性的后台页面。</p>
        </div>
        <div class="topbar-meta">
          <span class="status-chip" id="env-chip">等待健康检查</span>
          <span class="status-chip" id="auth-chip">尚未登录</span>
        </div>
      </header>

      <section class="panel">
        <h2>管理员会话</h2>
        <div class="auth-grid">
          <div class="field">
            <label for="login-username">用户名</label>
            <input id="login-username" placeholder="admin">
          </div>
          <div class="field">
            <label for="login-password">密码</label>
            <input id="login-password" type="password" placeholder="password">
          </div>
          <div class="field">
            <label for="request-id-output">最近 request_id</label>
            <input id="request-id-output" readonly placeholder="等待请求">
          </div>
          <div class="field">
            <label>操作</label>
            <div class="actions">
              <button id="btn-login">登录</button>
              <button id="btn-logout" class="secondary">退出</button>
              <button id="btn-refresh" class="secondary">刷新当前页</button>
            </div>
          </div>
        </div>
      </section>

      <div id="global-notice"></div>
      <div id="action-summary"></div>
      <div id="ops-view-root"></div>
    </main>
  </div>

  <div id="confirm-modal" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
      <h2 id="confirm-modal-title">请确认操作</h2>
      <p id="confirm-modal-copy" class="muted">这里会显示本次操作说明。</p>
      <pre id="confirm-modal-detail" class="hidden"></pre>
      <div class="actions" style="margin-top:16px">
        <button id="btn-confirm-modal" class="danger">确认执行</button>
        <button id="btn-cancel-modal" class="secondary">取消</button>
      </div>
    </div>
  </div>

  <script src="/static/ops-console.js"></script>
</body>
</html>

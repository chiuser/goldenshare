# Copy this file to lake_console/config.local.toml and fill local-only values.
# config.local.toml is ignored by git and must never be committed.

lake_root = "/Volumes/YourDisk/goldenshare-tushare-lake"
tushare_token = "fill-your-tushare-token-here"

# Optional. Only used by explicit prod-raw-db export commands.
# Must point to a read-only user with access limited to raw_tushare whitelist tables.
prod_raw_db_url = ""

# Optional local server settings.
host = "127.0.0.1"
port = 8010

# Optional stk_mins write tuning.
bucket_count = 32
target_part_size_mb = 256

# Optional Tushare API rate limit. Keep requests at or below this per minute.
tushare_request_limit_per_minute = 500

# Optional stk_mins request window. Range sync requests one symbol/freq per window,
# then writes rows back to daily partitions. 31 means roughly one natural month.
stk_mins_request_window_days = 31
